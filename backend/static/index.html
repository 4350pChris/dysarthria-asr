<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dysarthria ASR Prototype</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main>
      <section class="toolbar">
        <h1>Dysarthria ASR</h1>
        <button id="record">Aufnehmen</button>
        <button id="stop" disabled>Stopp</button>
        <button id="speak" disabled>Vorlesen</button>
      </section>

      <label>
        Testsatz
        <select id="phrase">
          <option value="">Freier Text</option>
        </select>
      </label>

      <label>
        Audiodatei hochladen
        <input id="upload" type="file" accept="audio/*" />
      </label>

      <label>
        Rohe ASR-Erkennung
        <textarea id="raw" readonly placeholder="Die Erkennung erscheint hier"></textarea>
      </label>

      <section id="suggestionsSection" class="suggestions" hidden>
        <h2>Vorschläge</h2>
        <div id="suggestions"></div>
      </section>

      <label>
        Zieltext
        <textarea id="target" placeholder="Den gemeinten Satz eingeben"></textarea>
      </label>

      <button id="save" disabled>Korrektur speichern</button>
      <p id="status"></p>

      <section class="analysis">
        <h2>Analyse</h2>
        <div class="metrics">
          <div><strong id="total">0</strong><span>Versuche</span></div>
          <div><strong id="exactRate">0%</strong><span>exakt erkannt</span></div>
          <div><strong id="topRate">0%</strong><span>Top 1</span></div>
        </div>
      </section>

      <section class="review">
        <div class="review-header">
          <h2>Letzte Versuche</h2>
          <a class="button" href="/api/speech-attempts.csv" download>CSV exportieren</a>
        </div>
        <table>
          <thead>
            <tr>
              <th>Rohe ASR</th>
              <th>Zieltext</th>
              <th>Vorschlag</th>
            </tr>
          </thead>
          <tbody id="speechAttempts"></tbody>
        </table>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
