name: Docker images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  packages: write

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/4350pchris/dysarthria-asr-frontend
  BACKEND_IMAGE: ghcr.io/4350pchris/dysarthria-asr-backend

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install backend dependencies
        run: uv sync --frozen --group dev

      - name: Run backend tests
        run: |
          mkdir -p reports
          uv run pytest --junitxml=reports/backend-pytest.xml

      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: backend-pytest-report
          path: backend/reports/backend-pytest.xml
          if-no-files-found: error

      - name: Summarize backend tests
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Backend pytest
          path: backend/reports/backend-pytest.xml
          reporter: java-junit
          fail-on-error: false

  build-and-push:
    needs: backend-tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
